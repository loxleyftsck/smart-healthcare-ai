version: '3.8'

services:
  # Laravel App Container
  app:
    build:
      context: ./smart-health-ai
      dockerfile: Dockerfile
    image: smarthealth-app
    container_name: smarthealth_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./smart-health-ai:/var/www/html
    networks:
      - smarthealth-network
    environment:
      - DB_HOST=mysql
      - AI_TRIAGE_SERVICE_URL=http://ai-triage:8001

  # Python AI Triage Container
  ai-triage:
    build:
      context: ./ai-triage-service
      dockerfile: Dockerfile
    image: smarthealth-ai-triage
    container_name: smarthealth_ai_triage
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ./ai-triage-service:/app
    networks:
      - smarthealth-network
    env_file:
      - ./ai-triage-service/.env

  # Web Server
  nginx:
    image: nginx:alpine
    container_name: smarthealth_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./smart-health-ai:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - smarthealth-network

  # Database
  mysql:
    image: mysql:8.0
    container_name: smarthealth_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-smart_health_ai}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - smarthealth-network

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: smarthealth_prometheus
    restart: unless-stopped
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - smarthealth-network

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: smarthealth_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - smarthealth-network

networks:
  smarthealth-network:
    driver: bridge

volumes:
  mysql_data:
  grafana_data:
