name: 🧪 CI — Staging (QA Environment)

on:
  push:
    branches: [ staging ]
  pull_request:
    branches: [ staging ]

env:
  PHP_VERSION: '8.2'

jobs:
  # ──────────────────────────────────────────
  # JOB 1: Full Test Suite
  # ──────────────────────────────────────────
  test-full:
    name: 🧪 Full Test Suite (Min Coverage 80%)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: smart_health_ai_staging
        ports: ['3306:3306']
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, bcmath
          coverage: xdebug

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-staging-${{ hashFiles('**/composer.lock') }}

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Setup Environment
        run: |
          cp .env.example .env
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=smart_health_ai_staging/' .env
          sed -i 's/DB_USERNAME=.*/DB_USERNAME=root/' .env
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=password/' .env
          sed -i 's/APP_ENV=.*/APP_ENV=staging/' .env

      - name: Generate Keys
        run: |
          php artisan key:generate
          php artisan jwt:secret --force

      - name: Run Migrations + Seeders
        run: php artisan migrate --seed --force

      - name: Run Full Test Suite (80% coverage required)
        run: |
          php artisan test \
            --coverage-clover coverage.xml \
            --min-coverage=80

      - name: Upload Coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          flags: staging

  # ──────────────────────────────────────────
  # JOB 2: Security & Vulnerability Scan
  # ──────────────────────────────────────────
  security-scan:
    name: 🔐 Security & SAST Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}

      - name: Install Dependencies
        run: composer install --no-interaction

      - name: Composer Audit (known CVEs)
        run: composer audit

      - name: PHP Security Checker
        uses: symfonycorp/security-checker-action@v5

      - name: Secret Detection
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  # ──────────────────────────────────────────
  # JOB 3: Integration Tests (API End-to-End)
  # ──────────────────────────────────────────
  integration-test:
    name: 🔗 Integration / E2E Tests
    runs-on: ubuntu-latest
    needs: test-full

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: smart_health_ai_e2e
        ports: ['3306:3306']
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, pdo_mysql, bcmath

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Setup Environment
        run: |
          cp .env.example .env
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=smart_health_ai_e2e/' .env
          sed -i 's/DB_USERNAME=.*/DB_USERNAME=root/' .env
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=password/' .env
          php artisan key:generate
          php artisan jwt:secret --force
          php artisan migrate --force

      - name: Start Laravel Server
        run: php artisan serve --port=8000 &
        
      - name: Wait for Server
        run: sleep 3

      - name: Test Health Endpoint
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/health)
          echo "Health endpoint returned: $response"
          [ "$response" = "200" ] || exit 1

      - name: Run Full E2E API Tests
        run: php artisan test --group=e2e

  # ──────────────────────────────────────────
  # JOB 4: Deploy to QA/Staging (requires approval)
  # ──────────────────────────────────────────
  deploy-staging:
    name: 🚀 Deploy → QA/STAGING
    runs-on: ubuntu-latest
    needs: [test-full, security-scan, integration-test]
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    environment:
      name: staging
      url: https://qa.smarthealthai.com

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Staging Server
        run: echo "🚀 Deploying to QA/Staging environment..."
        # TODO: Add SSH / Docker / cloud deployment steps
