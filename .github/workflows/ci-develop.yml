name: 🔬 CI — Develop (Dev Environment)

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]

env:
  PHP_VERSION: '8.2'

jobs:
  # ──────────────────────────────────────────
  # JOB 1: Code Quality & Static Analysis
  # ──────────────────────────────────────────
  lint:
    name: 🧹 Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('**/composer.lock') }}

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Check PHP Syntax
        run: find app config database routes -name "*.php" | xargs php -l

      - name: Run PHP CS Fixer (PSR-12)
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --verbose || true

  # ──────────────────────────────────────────
  # JOB 2: Unit & Feature Tests
  # ──────────────────────────────────────────
  test:
    name: 🧪 Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        php: ['8.2']

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: smart_health_ai_test
        ports: ['3306:3306']
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, bcmath
          coverage: xdebug

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('**/composer.lock') }}

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy .env
        run: cp .env.example .env

      - name: Configure Test Environment
        run: |
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=smart_health_ai_test/' .env
          sed -i 's/DB_USERNAME=.*/DB_USERNAME=root/' .env
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=password/' .env
          sed -i 's/JWT_TTL=.*/JWT_TTL=15/' .env

      - name: Generate App Key
        run: php artisan key:generate

      - name: Generate JWT Secret
        run: php artisan jwt:secret --force

      - name: Run Migrations
        run: php artisan migrate --force

      - name: Run Tests with Coverage
        run: |
          php artisan test \
            --coverage-clover coverage.xml \
            --min-coverage=70

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          flags: develop
          fail_ci_if_error: false

  # ──────────────────────────────────────────
  # JOB 3: Security Scan
  # ──────────────────────────────────────────
  security:
    name: 🔐 Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Check for Known Vulnerabilities
        run: composer audit

      - name: Scan for Secrets in Code
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: HEAD~1
          head: HEAD
          extra_args: --only-verified

  # ──────────────────────────────────────────
  # JOB 4: Deploy to Dev Environment
  # ──────────────────────────────────────────
  deploy-dev:
    name: 🚀 Deploy → DEV
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: development
      url: https://dev.smarthealthai.com

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Dev Server
        run: echo "🚀 Deploying to DEV environment..."
        # TODO: Add actual deployment steps (SSH, Docker push, etc.)
