global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'ai-triage-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['ai-triage:8001']

  - job_name: 'laravel-app'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['app:9000']
